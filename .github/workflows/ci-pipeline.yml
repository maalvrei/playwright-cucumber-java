name: CI Automation Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

# Permisos para que el bot pueda crear la rama "gh-pages" y subir la web
permissions:
  contents: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar el código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 Instalar Dependencias de Maven
        run: mvn clean install -DskipTests

      - name: 🎭 Instalar Navegadores de Playwright
        run: mvn exec:java -e -D"exec.mainClass"="com.microsoft.playwright.CLI" -D"exec.args"="install --with-deps"

      - name: 🚀 Ejecutar Pruebas E2E y API
        run: mvn test
        env:
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: 'true'
        continue-on-error: true

      # === MAGIA DE GITHUB PAGES (REPORTE PÚBLICO) ===

      - name: 📂 Obtener historial previo de Allure
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: 📊 Generar Reporte Allure (HTML)
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: target/allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: 🌐 Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history